name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  maven-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Maven multi-module build
        run: mvn -B -ntp verify

  deployment-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.16.4

      - name: Validate Docker Compose and Helm artifacts
        shell: pwsh
        run: ./ops/deployment/validate.ps1

  container-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        module:
          - lsf-example
          - lsf-service-template
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build ${{ matrix.module }} image
        run: docker build -f ${{ matrix.module }}/Dockerfile -t ${{ matrix.module }}:ci .
