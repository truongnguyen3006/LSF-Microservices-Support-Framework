spring:
  datasource:
    url: jdbc:mysql://${LSF_MYSQL_HOST:localhost}:${LSF_MYSQL_PORT:3306}/${LSF_MYSQL_DATABASE:lsf_example}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${LSF_MYSQL_USERNAME:root}
    password: ${LSF_MYSQL_PASSWORD:root}

  flyway:
    enabled: true

lsf:
  outbox:
    enabled: true
    publisher:
      enabled: true
      claim-strategy: SKIP_LOCKED
      poll-interval: 1s
      initial-delay: 1s
      batch-size: 50
      lease: 10s
      backoff-base: 1s
      backoff-max: 60s
      max-retries: 10
      send-timeout: 10s
    metrics:
      enabled: true
    admin:
      enabled: true
      base-path: "/lsf/outbox"
      default-limit: 50
      max-limit: 200
      allow-delete: false
