spring:
  application:
    name: template-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    module: lsf-service-template

template:
  service:
    integration-topic: template.integration.events
    integration-event-type: template.resource.requested.v1
    workflow-reply-topic: template.workflow.replies
    workflow-completed-event-type: template.workflow.step.completed.v1

lsf:
  service:
    web:
      enabled: true

  security:
    enabled: true
    mode: API_KEY
    public-paths:
      - /actuator/health
      - /actuator/info
    api-key:
      value: local-dev-key
      authorities:
        - ROLE_LSF_INTERNAL

  discovery:
    mode: STATIC
    services:
      dependency-service:
        - uri: http://localhost:8081

  http:
    client:
      connect-timeout: 1s
      read-timeout: 2s
      authentication:
        mode: API_KEY
        api-key:
          value: local-dev-key

  resilience:
    instances:
      dependency-service-http:
        retry:
          enabled: true
          max-attempts: 3
          wait-duration: 200ms
        timeout:
          enabled: true
          duration: 2s

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: template-service

  eventing:
    producer-name: ${spring.application.name}
    consume-topics:
      - template.integration.events
      - template.workflow.commands
    idempotency:
      enabled: false
